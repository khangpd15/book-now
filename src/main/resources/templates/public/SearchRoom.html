<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Tìm kiếm phòng - BookNow')}"></head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=more_horiz"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<body class="bg-gray-50 font-sans text-gray-800 pb-12">

<div th:replace="~{fragments/navbar}"></div>

<div class="max-w-7xl mx-auto px-4 pt-32 flex flex-col lg:flex-row gap-8">
    <aside class="lg:w-1/4 space-y-6">
        <div class="flex items-center space-x-4 p-6 bg-white rounded-xl shadow-sm border border-gray-100">
            <a th:href="@{/home}" class="group flex items-center justify-center w-10 h-10 rounded-lg border border-gray-200 text-gray-500 hover:text-blue-600 transition-all bg-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <span class="text-gray-600 font-medium text-sm">Quay lại trang chủ</span>
        </div>

        <form id="searchForm" th:action="@{/search}" th:object="${search}" method="post" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
            <input type="hidden" id="pageNumber" th:field="*{page}" />
            <input type="hidden" id="sortTypeInput" th:field="*{sortType}" />

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-gray-800">Bộ lọc</h2>
                <a th:href="@{/search}" class="text-xs text-blue-600 hover:underline font-medium">Đặt lại</a>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-2">Tìm kiếm</label>
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    <input th:field="*{keyword}" type="text" placeholder="Tên phòng..." class="w-full h-10 pl-9 pr-4 text-sm border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-3">Mức giá</label>
                <select th:field="*{price}" class="w-full h-10 px-3 text-sm border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                    <option value="">Tất cả mức giá</option>
                    <option value="low">&lt; 300.000đ</option>
                    <option value="mid">300.000đ – 800.000đ</option>
                    <option value="high">&gt; 800.000đ</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-3">Số khách</label>
                <div class="flex gap-2">
                    <label th:each="v : ${ {1, 2, 4} }" class="flex-1 cursor-pointer">
                        <input type="radio" th:field="*{maxGuest}" th:value="${v}" class="hidden peer">
                        <div class="h-9 rounded-lg border border-gray-200 text-gray-500 flex items-center justify-center peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 text-xs font-medium">
                            <span th:text="${v} + ' Người'"></span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-3">Tiện nghi</label>
                <div class="flex flex-wrap gap-2">
                    <label th:each="a, start : ${amenities}" th:classappend="${start.index >= 3} ? 'hidden amenity-extra' : ''" class="cursor-pointer">
                        <input type="checkbox" name="amenity" th:value="${a.name}" th:checked="${search.amenity != null && search.amenity.contains(a.name)}" class="hidden peer">
                        <div class="px-3 py-1.5 rounded-full border border-gray-200 bg-gray-50 text-[11px] text-gray-600 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:border-blue-200">
                            <span th:text="${a.name}"></span>
                        </div>
                    </label>
                    <span id="toggleAmenity"
                          class="material-symbols-outlined text-gray-400
                             cursor-pointer hover:text-blue-500 transition">
                    more_horiz
                </span>
                </div>
            </div>

            <button type="submit" onclick="document.getElementById('pageNumber').value=0" class="w-full h-11 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl shadow-md flex items-center justify-center gap-2 transition">
                <i class="fa-solid fa-filter"></i> Tìm phòng
            </button>
        </form>
    </aside>

    <main class="lg:w-3/4">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-xl font-bold text-gray-800">
                <span class="text-blue-600" th:text="${rooms.totalElements}"></span> phòng phù hợp
            </h1>
            <div class="flex items-center gap-3">
                <span class="text-sm text-gray-500">Sắp xếp:</span>
                <select onchange="syncSortAndSubmit(this.value)" class="pl-3 pr-8 py-1.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white cursor-pointer">
                    <option value="default" th:selected="${search.sortType == 'default' || search.sortType == null}">Mặc định</option>
                    <option value="popular" th:selected="${search.sortType == 'popular'}">Phổ biến nhất</option>
                    <option value="price_asc" th:selected="${search.sortType == 'price_asc'}">Giá thấp đến cao</option>
                    <option value="price_desc" th:selected="${search.sortType == 'price_desc'}">Giá cao đến thấp</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div th:each="room : ${rooms}" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-lg transition-all group flex flex-col">
                <div class="relative h-56 overflow-hidden">
                    <img th:src="${room.imageUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-2 py-1 rounded text-xs font-bold text-gray-800 shadow-sm" th:text="${room.getRoomType()}"></div>
                </div>
                <div class="p-5 flex-1 flex flex-col">
                    <h3 class="text-lg font-bold text-gray-800 group-hover:text-blue-600 transition-colors" th:text="${room.roomNumber}"></h3>

                    <p class="text-sm text-gray-500 mb-4 line-clamp-2" th:text="${room.description}"></p>
                    <div class="flex items-center gap-4 text-xs text-gray-500 mb-4">
                        <span class="flex items-center"><i class="fa-solid fa-user-group mr-1.5 text-blue-500"></i> <span th:text="${room.maxGuest} + ' Khách'"></span></span>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-100 flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-400">Giá theo giờ</span>
                            <span class="text-base font-bold text-gray-800">
                                [[${#numbers.formatDecimal(room.basePrice, 0, 'COMMA', 0, 'POINT')}]]đ <span class="text-xs font-normal text-gray-500">/ slot</span>
                            </span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-400">Giá qua đêm</span>
                            <span class="text-base font-bold text-blue-600">
                                [[${#numbers.formatDecimal(room.overPrice, 0, 'COMMA', 0, 'POINT')}]]đ <span class="text-xs font-normal text-gray-500">/ đêm</span>
                            </span>
                        </div>
                        <a th:href="@{|/detail/${room.getRoomId()}|}">
                            <button class="w-full mt-3 bg-gray-900 text-white px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-600 transition-colors shadow-md">Xem chi tiết</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${rooms.totalPages > 0}" class="mt-12 flex justify-center items-center gap-2">

            <button type="button"
                    th:disabled="${rooms.number == 0}"
                    th:onclick="'changePage(' + (${rooms.number - 1}) + ')'"
                    class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-chevron-left text-xs text-gray-500"></i>
            </button>

            <th:block th:each="pageNo : ${pageNumbers}">
                <button type="button"
                        th:text="${pageNo + 1}"
                        th:onclick="|changePage(${pageNo})|"
                        th:classappend="${pageNo == rooms.number} ? 'bg-blue-600 text-white border-blue-600' : 'border-gray-200 hover:bg-gray-100 text-gray-700'"
                        class="w-10 h-10 rounded-lg border font-medium transition-all">
                </button>
            </th:block>

            <button type="button"
                    th:disabled="${rooms.number == rooms.totalPages - 1}"
                    th:onclick="'changePage(' + (${rooms.number + 1}) + ')'"
                    class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-chevron-right text-xs text-gray-500"></i>
            </button>
        </div>
    </main>
</div>

<script>
    function changePage(index) {
        console.log("Đang chuyển sang trang index:", index); // Để debug

        const form = document.getElementById('searchForm');
        const pageInput = document.getElementById('pageNumber');

        if (form && pageInput) {
            pageInput.value = index;
            form.submit();
        } else {
            console.error("Không tìm thấy searchForm hoặc pageInput trong HTML!");
        }
    }

    // 2. Sắp xếp (Đồng bộ vào form chính)
    function syncSortAndSubmit(val) {
        document.getElementById('sortTypeInput').value = val;
        document.getElementById('pageNumber').value = 0; // Reset về trang 1
        document.getElementById('searchForm').submit();
    }

    // 3. Toggle Tiện nghi
    const toggleBtn = document.getElementById("toggleAmenity");
    const extraAmenities = document.querySelectorAll(".amenity-extra");
    let isExpanded = false;

    toggleBtn.addEventListener("click", () => {
        isExpanded = !isExpanded;
        extraAmenities.forEach(el => el.classList.toggle("hidden", !isExpanded));
        toggleBtn.innerText = isExpanded ? "expand_less" : "more_horiz";
    });
</script>
<div th:replace="~{fragments/navbar :: dropdown-script}"></div>
</body>
</html>
