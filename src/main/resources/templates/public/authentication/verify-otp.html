<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Xác Thực OTP - BookNow')}"></head>
<body class="font-['Segoe_UI',Tahoma,Geneva,Verdana,sans-serif] bg-gradient-to-br from-[#667eea] to-[#764ba2] min-h-screen flex justify-center items-center m-0 p-0">
<div class="bg-white p-[40px] rounded-[10px] shadow-[0_15px_35px_rgba(0,0,0,0.2)] w-full max-w-[400px]">
    <h2 class="text-center text-[#333] mb-[30px] text-2xl font-bold">
        <i class="fa-solid fa-shield-halved text-2xl text-blue-600 me-[10px]"></i>Xác Thực OTP</h2>

    <p class="text-center text-[#666] mb-[20px] text-[14px]">
        Mã OTP đã được gửi đến email của bạn.<br>
        Vui lòng kiểm tra và nhập mã bên dưới.
    </p>

    <!-- Error Message -->
    <div th:if="${error}" class="p-[12px] rounded-[5px] mb-[20px] bg-[#f8d7da] text-[#721c24] border border-[#f5c6cb]" th:text="${error}"></div>

    <!-- Success Message -->
    <div th:if="${message}" class="p-[12px] rounded-[5px] mb-[20px] bg-[#d4edda] text-[#155724] border border-[#c3e6cb]" th:text="${message}"></div>

    <!-- Email Info -->
    <div class="p-[12px] rounded-[5px] mb-[20px] bg-[#d1ecf1] text-[#0c5460] border border-[#bee5eb]" th:if="${verifyOtpRequest != null}">
        Email: <strong th:text="${verifyOtpRequest.email}"></strong>
    </div>

    <form th:action="@{/verify-otp}" th:object="${verifyOtpRequest}" method="post">
        <!-- Hidden email field -->
        <input type="hidden" th:field="*{email}">

        <div class="mb-[20px]">
            <label for="otp" class="block mb-[5px] text-[#555] font-medium">Mã OTP (6 chữ số)</label>
            <input type="text"
                   id="otp"
                   th:field="*{otp}"
                   class="w-full p-[12px] border-2 border-[#ddd] rounded-[5px] text-[24px] font-bold transition-colors duration-300 text-center tracking-[5px] focus:outline-none focus:border-[#667eea]"
                   placeholder="000000"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   required>
        </div>

        <button type="submit" class="w-full p-[12px] bg-gradient-to-br from-[#667eea] to-[#764ba2] text-white border-none rounded-[5px] text-[16px] cursor-pointer transition-transform duration-200 hover:-translate-y-[2px] disabled:bg-none disabled:bg-[#ccc] disabled:cursor-not-allowed disabled:transform-none disabled:hover:translate-y-0">Xác Nhận</button>
    </form>

    <!-- Resend OTP Form -->
    <form th:action="@{/resend-otp}" method="post" style="margin-top: 10px;" id="resendForm">
        <input type="hidden" name="email" th:value="${verifyOtpRequest != null ? verifyOtpRequest.email : ''}">
        <button type="submit" id="resendBtn" disabled
                class="w-full p-[12px] bg-[#6c757d] text-white border-none rounded-[5px] text-[16px] cursor-pointer transition-transform duration-200 hover:bg-[#5a6268] hover:-translate-y-[2px]">
            <span id="countdown">Gửi lại sau 60 s</span>
            <span id="resendOtp">Gửi lại OTP</span>
        </button>
    </form>

    <div class="text-center mt-[20px]">
        <a th:href="@{/forgot-password}" class="text-[#667eea] no-underline hover:underline">← Quay lại</a>
    </div>
</div>

<script>
    const countdown = document.getElementById('countdown');
    const resendOtp = document.getElementById('resendOtp');
    const resendBtn = document.getElementById('resendBtn');
    let countdownTime = 60;
    let interval = setInterval(() => {
        if (countdownTime <= 0) {
            countdown.style.display = 'none';
            resendOtp.style.display = 'inline';
            resendBtn.removeAttribute('disabled');
            clearInterval(interval);
        }
        countdownTime--;
        countdown.innerText = 'Gửi lại sau ' + countdownTime + 's';
    }, 1000);


</script>
</body>
</html>
