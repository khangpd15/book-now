<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Đặt Lại Mật Khẩu - BookNow')}"></head>
<body class="font-['Segoe_UI',Tahoma,Geneva,Verdana,sans-serif] bg-gradient-to-br from-[#667eea] to-[#764ba2] min-h-screen flex justify-center items-center m-0 p-0">
<div class="bg-white p-[40px] rounded-[10px] shadow-[0_15px_35px_rgba(0,0,0,0.2)] w-full max-w-[400px]">
    <h2 class="text-center text-[#333] mb-[30px] text-2xl font-bold">🔑 Đặt Lại Mật Khẩu</h2>

    <p class="text-center text-[#666] mb-[20px] text-[14px]">
        Vui lòng nhập mật khẩu mới cho tài khoản của bạn.
    </p>


    <!-- Error Message -->
    <div th:if="${error}" class="p-[12px] rounded-[5px] mb-[20px] bg-[#f8d7da] text-[#721c24] border border-[#f5c6cb]" th:text="${error}"></div>

    <!-- Success Message -->
    <div th:if="${success}" class="p-[12px] rounded-[5px] mb-[20px] bg-[#d4edda] text-[#155724] border border-[#c3e6cb]" th:text="${success}"></div>

    <form th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post">
        <!-- Hidden token field -->
        <input type="hidden" th:field="*{token}">

        <div class="mb-[20px]">
            <label for="newPassword" class="block mb-[5px] text-[#555] font-medium">Mật khẩu mới</label>
            <div class="relative">
                <input type="password"
                       id="newPassword"
                       th:field="*{newPassword}"
                       placeholder="Nhập mật khẩu mới"
                       class="w-full p-[12px] border-2 border-[#ddd] rounded-[5px] text-[16px] transition-colors duration-300 focus:outline-none focus:border-[#667eea]"
                       required>
                <!-- Nút Toggle Ẩn/Hiện -->
                <button type="button" onclick="togglePassword('newPassword', 'eye-new', 'eye-slash-new')" class="absolute inset-y-0 right-0 pr-[15px] flex items-center text-gray-500 hover:text-[#667eea] transition-colors">
                    <!-- Icon Mở mắt (Hiện mật khẩu) -->
                    <svg id="eye-new" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <!-- Icon Nhắm mắt (Ẩn mật khẩu) -->
                    <svg id="eye-slash-new" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="mb-[20px]">
            <label for="confirmPassword" class="block mb-[5px] text-[#555] font-medium">Xác nhận mật khẩu</label>
            <div class="relative">
                <input type="password"
                       id="confirmPassword"
                       th:field="*{confirmPassword}"
                       placeholder="Nhập lại mật khẩu mới"
                       class="w-full p-[12px] border-2 border-[#ddd] rounded-[5px] text-[16px] transition-colors duration-300 focus:outline-none focus:border-[#667eea]"
                       required>
                <!-- Nút Toggle Ẩn/Hiện -->
                <button type="button" onclick="togglePassword('confirmPassword', 'eye-confirm', 'eye-slash-confirm')" class="absolute inset-y-0 right-0 pr-[15px] flex items-center text-gray-500 hover:text-[#667eea] transition-colors">
                    <!-- Icon Mở mắt (Hiện mật khẩu) -->
                    <svg id="eye-confirm" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <!-- Icon Nhắm mắt (Ẩn mật khẩu) -->
                    <svg id="eye-slash-confirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="w-full p-[12px] bg-gradient-to-br from-[#667eea] to-[#764ba2] text-white border-none rounded-[5px] text-[16px] cursor-pointer transition-transform duration-200 hover:-translate-y-[2px] disabled:bg-none disabled:bg-[#ccc] disabled:cursor-not-allowed disabled:transform-none disabled:hover:translate-y-0">Đặt Lại Mật Khẩu</button>
    </form>

    <div class="text-center mt-[20px]">
        <a th:href="@{/auth/login}" class="text-[#667eea] no-underline hover:underline">← Quay lại đăng nhập</a>
    </div>
</div>
<script>
    function togglePassword(inputId, eyeId, eyeSlashId) {
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        const eyeSlash = document.getElementById(eyeSlashId);

        if (input.type === 'password') {
            input.type = 'text';
            eye.classList.remove('hidden');
            eyeSlash.classList.add('hidden');
        } else {
            input.type = 'password';
            eye.classList.add('hidden');
            eyeSlash.classList.remove('hidden');
        }
    }
</script>
</body>
</html>
