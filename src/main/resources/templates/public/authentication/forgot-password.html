<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Quên Mật Khẩu - BookNow')}"></head>
<body class="font-['Segoe_UI',Tahoma,Geneva,Verdana,sans-serif] bg-gradient-to-br from-[#667eea] to-[#764ba2] min-h-screen flex justify-center items-center m-0 p-0">
<div class="bg-white p-[40px] rounded-[10px] shadow-[0_15px_35px_rgba(0,0,0,0.2)] w-full max-w-[400px]">
    <h2 class="text-center text-[#333] mb-[30px] text-2xl font-bold">🔐 Quên Mật Khẩu</h2>

    <p class="text-center text-[#666] mb-[20px] text-[14px]">
        Nhập email đã đăng ký để nhận mã OTP đặt lại mật khẩu.
    </p>

    <!-- Error Message -->
    <div th:if="${error}" class="p-[12px] rounded-[5px] mb-[20px] bg-[#f8d7da] text-[#721c24] border border-[#f5c6cb]" th:text="${error}"></div>

    <!-- Success Message -->
    <div th:if="${message}" class="p-[12px] rounded-[5px] mb-[20px] bg-[#d4edda] text-[#155724] border border-[#c3e6cb]" th:text="${message}"></div>

    <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
        <div class="mb-[20px]">
            <label for="email" class="block mb-[5px] text-[#555] font-medium">Email</label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   placeholder="Nhập email của bạn"
                   class="w-full p-[12px] border-2 border-[#ddd] rounded-[5px] text-[16px] transition-colors duration-300 focus:outline-none focus:border-[#667eea]"
                   required>
        </div>

        <button type="submit" class="w-full p-[12px] bg-gradient-to-br from-[#667eea] to-[#764ba2] text-white border-none rounded-[5px] text-[16px] cursor-pointer transition-transform duration-200 hover:-translate-y-[2px] disabled:bg-none disabled:bg-[#ccc] disabled:cursor-not-allowed disabled:transform-none disabled:hover:translate-y-0">Gửi OTP</button>
    </form>

    <div class="text-center mt-[20px]">
        <a th:href="@{/auth/login}" class="text-[#667eea] no-underline hover:underline">← Quay lại đăng nhập</a>
    </div>
</div>
</body>
</html>
