<!DOCTYPE html>
<html lang="vi">
<head th:replace="~{fragments/head :: head(title='Đặt lại mật khẩu - BookNow')}"></head>
<style>
        /* Specific Logo Positioning Rule */
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 50;
        }

        /* Subtle background pattern */
        body {
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Valid/Invalid Icon Styles */
        .rule-valid {
            color: #10b981; /* green-500 */
        }
        .rule-invalid {
            color: #9ca3af; /* gray-400 */
        }
</style>
<body class="min-h-screen flex items-center justify-center font-sans text-gray-800 relative p-4">

<div th:replace="~{fragments/navbar :: public-navbar}"></div>

    <!-- MAIN CARD -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header -->
        <div class="px-8 pt-10 pb-4 text-center">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-lock-open text-2xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Đặt lại mật khẩu</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
                Vui lòng nhập mật khẩu mới cho tài khoản của bạn.
            </p>
        </div>

        <!-- Form -->
        <div class="px-8 pb-8">
            <form id="resetPasswordForm" class="space-y-5" novalidate>
                
                <!-- New Password -->
                <div class="space-y-1">
                    <label for="newPassword" class="block text-sm font-medium text-gray-700">Mật khẩu mới</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-key text-gray-400"></i>
                        </div>
                        <input type="password" id="newPassword" name="newPassword" 
                            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150 sm:text-sm" 
                            placeholder="Nhập mật khẩu mới">
                        <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 cursor-pointer focus:outline-none" data-target="newPassword">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    
                    <!-- Password Rules -->
                    <div class="mt-2 p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <p class="text-xs text-gray-500 font-semibold mb-2">Mật khẩu phải bao gồm:</p>
                        <ul class="space-y-1">
                            <li id="ruleLength" class="text-xs text-gray-400 flex items-center gap-2">
                                <i class="fa-regular fa-circle text-[10px]"></i> Tối thiểu 8 ký tự
                            </li>
                            <li id="ruleUpper" class="text-xs text-gray-400 flex items-center gap-2">
                                <i class="fa-regular fa-circle text-[10px]"></i> Ít nhất 1 chữ hoa
                            </li>
                            <li id="ruleLower" class="text-xs text-gray-400 flex items-center gap-2">
                                <i class="fa-regular fa-circle text-[10px]"></i> Ít nhất 1 chữ thường
                            </li>
                            <li id="ruleNumber" class="text-xs text-gray-400 flex items-center gap-2">
                                <i class="fa-regular fa-circle text-[10px]"></i> Ít nhất 1 số
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-1">
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Xác nhận mật khẩu mới</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="confirmPassword" name="confirmPassword" 
                            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150 sm:text-sm" 
                            placeholder="Nhập lại mật khẩu mới">
                        <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 cursor-pointer focus:outline-none" data-target="confirmPassword">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <!-- Match Error -->
                    <p id="matchError" class="hidden text-xs text-red-500 mt-1 flex items-center">
                        <i class="fa-solid fa-circle-exclamation mr-1"></i> Mật khẩu xác nhận không khớp.
                    </p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" disabled
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-gray-400">
                    <span id="btnText">Đặt lại mật khẩu</span>
                    <i id="btnLoader" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
                </button>

                <!-- Back to Login -->
                <div class="text-center pt-2">
                    <a th:href="@{/auth/login}" class="text-sm font-medium text-gray-600 hover:text-blue-600 flex items-center justify-center gap-2 transition-colors">
                        <i class="fa-solid fa-arrow-left text-xs"></i>
                        Quay lại đăng nhập
                    </a>
                </div>

            </form>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('resetPasswordForm');
            const newPassInput = document.getElementById('newPassword');
            const confirmPassInput = document.getElementById('confirmPassword');
            const matchError = document.getElementById('matchError');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const toggleBtns = document.querySelectorAll('.toggle-password');

            // Rule Elements
            const rules = {
                length: document.getElementById('ruleLength'),
                upper: document.getElementById('ruleUpper'),
                lower: document.getElementById('ruleLower'),
                number: document.getElementById('ruleNumber')
            };

            // Toggle Password Visibility
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    const icon = btn.querySelector('i');
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });

            // Validation Logic
            function validatePassword() {
                const val = newPassInput.value;
                
                const checks = {
                    length: val.length >= 8,
                    upper: /[A-Z]/.test(val),
                    lower: /[a-z]/.test(val),
                    number: /[0-9]/.test(val)
                };

                // Update UI for each rule
                updateRuleUI(rules.length, checks.length);
                updateRuleUI(rules.upper, checks.upper);
                updateRuleUI(rules.lower, checks.lower);
                updateRuleUI(rules.number, checks.number);

                // Check Match
                const isMatch = val === confirmPassInput.value && val !== '';
                if (confirmPassInput.value !== '') {
                    if (!isMatch) {
                        matchError.classList.remove('hidden');
                        confirmPassInput.classList.add('border-red-300', 'focus:ring-red-200');
                        confirmPassInput.classList.remove('border-gray-300', 'focus:ring-blue-500');
                    } else {
                        matchError.classList.add('hidden');
                        confirmPassInput.classList.remove('border-red-300', 'focus:ring-red-200');
                        confirmPassInput.classList.add('border-gray-300', 'focus:ring-blue-500');
                    }
                } else {
                    matchError.classList.add('hidden');
                }

                // Enable/Disable Submit
                const isStrong = Object.values(checks).every(Boolean);
                submitBtn.disabled = !(isStrong && isMatch);
            }

            function updateRuleUI(element, isValid) {
                const icon = element.querySelector('i');
                if (isValid) {
                    element.classList.remove('text-gray-400');
                    element.classList.add('text-green-600', 'font-medium');
                    icon.className = 'fa-solid fa-circle-check text-[10px] text-green-500';
                } else {
                    element.classList.add('text-gray-400');
                    element.classList.remove('text-green-600', 'font-medium');
                    icon.className = 'fa-regular fa-circle text-[10px]';
                }
            }

            // Event Listeners
            newPassInput.addEventListener('input', validatePassword);
            confirmPassInput.addEventListener('input', validatePassword);

            // Submit Handler
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Loading State
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
                btnText.textContent = "Đang cập nhật...";
                btnLoader.classList.remove('hidden');

                setTimeout(() => {
                    alert("Mật khẩu đã được đặt lại thành công! Vui lòng đăng nhập.");
                    window.location.href = /*[[@{/auth/login}]]*/ "/auth/login";
                }, 1500);
            });
        });
    </script>

<div th:replace="~{fragments/navbar :: dropdown-script}"></div>

<footer th:replace="~{fragments/footer :: footer}"></footer>s
</body>
</html>
