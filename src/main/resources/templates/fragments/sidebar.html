<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ADMIN SIDEBAR FRAGMENT -->
<div th:fragment="admin-sidebar(activePage, prefix)">
    <!-- LOGO -->
    <a th:href="@{/home}">
        <div class="logo-fixed fixed top-5 left-6 z-[60] flex items-center gap-3 select-none bg-white/90 backdrop-blur px-3 py-2 rounded-xl shadow-sm lg:shadow-none lg:bg-transparent lg:p-0">
            <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center border border-blue-100">
                <i class="fa-solid fa-house-chimney gradient-icon text-xl"></i>
            </div>
            <div class="flex flex-col justify-center">
                <span class="text-2xl font-extrabold tracking-tight gradient-text leading-none">BookNow</span>
                <span class="text-[10px] text-gray-500 font-medium uppercase tracking-wider pl-0.5">Homestay System</span>
            </div>
        </div>
    </a>

    <!-- MOBILE HEADER -->
    <div class="lg:hidden fixed top-0 w-full bg-white h-20 shadow-sm z-40 flex items-center justify-end px-6">
        <button th:id="${prefix + '-mobileMenuBtn'}" class="text-gray-500 hover:text-blue-600 focus:outline-none">
            <i class="fa-solid fa-bars text-2xl"></i>
        </button>
    </div>

    <!-- SIDEBAR -->
    <aside th:id="${prefix + '-sidebar'}"
           class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 pt-28 overflow-y-auto no-scrollbar transition-transform duration-300">

        <nav class="px-4 space-y-2">
            <a th:href="@{/admin/dashboard}" th:classappend="${activePage == 'dashboard' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-solid fa-chart-line w-5"></i> Bảng điều khiển
            </a>
            <a th:href="@{/staff/bookings}" th:classappend="${activePage == 'bookings' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-regular fa-calendar-check w-5"></i> Đơn đặt phòng
            </a>
            <a th:href="@{/staff/rooms/list}" th:classappend="${activePage == 'rooms' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-solid fa-door-open w-5"></i> Phòng
            </a>
            <a th:href="@{/admin/account_list}" th:classappend="${activePage == 'accounts' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-solid fa-users-gear w-5"></i> Tài khoản nhân viên
            </a>
            <a th:href="@{/staff/manage-housekeeping}" th:classappend="${activePage == 'housekeeping' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-solid fa-broom"></i> Dọn dẹp
            </a>
            <a th:href="@{/staff/feedback}" th:classappend="${activePage == 'feedback' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-regular fa-comment-dots w-5"></i> Phản hồi khách hàng
            </a>
            <a th:href="@{/staff/offline-checkin}" th:classappend="${activePage == 'check-in' ? 'bg-blue-50 text-blue-600 ring-1 ring-black/5' : ''}" class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium">
                <i class="fa-solid fa-hotel w-5"></i> Check-in trực tiếp
            </a>
        </nav>

        <div class="absolute bottom-0 w-full p-4 border-t border-gray-100 bg-white">
            <a th:href="@{/auth/logout}" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg font-medium">
                <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Đăng xuất
            </a>
        </div>
    </aside>

    <!-- OVERLAY -->
    <div th:id="${prefix + '-sidebarOverlay'}" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>
</div>

<!-- SCRIPT -->
<script th:fragment="sidebar-scripts(prefix)">
    const prefix = /*[[${prefix}]]*/ 'default'
    const mobileMenuBtn = document.getElementById(prefix + '-mobileMenuBtn');
    const sidebar = document.getElementById(prefix + '-sidebar');
    const sidebarOverlay = document.getElementById(prefix + '-sidebarOverlay');

    if (mobileMenuBtn && sidebar && sidebarOverlay) {
        function toggleSidebar() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            sidebar.classList.toggle('-translate-x-full', !isClosed);
            sidebarOverlay.classList.toggle('hidden', !isClosed);
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
    }
</script>
</body>
</html>
