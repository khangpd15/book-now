<!DOCTYPE html>
<html lang="vi">
<head th:replace="~{fragments/head :: head(title='Quên mật khẩu - BookNow')}"></head>
<style>
        /* Specific Logo Positioning Rule */
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 50;
        }

        /* Subtle background pattern */
        body {
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }
</style>
<body class="min-h-screen flex items-center justify-center font-sans text-gray-800 relative p-4">

<div th:replace="~{fragments/navbar :: public-navbar}"></div>

    <!-- MAIN CARD -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header -->
        <div class="px-8 pt-10 pb-4 text-center">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-key text-2xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Quên mật khẩu?</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
                Đừng lo lắng! Vui lòng nhập email đăng ký,<br>chúng tôi sẽ gửi mã xác thực cho bạn.
            </p>
        </div>

        <!-- Form -->
        <div class="px-8 pb-8">
            <form th:action="@{/forgot-password}" id="forgotPasswordForm" class="space-y-6" novalidate method="post">
                
                <!-- Email Field -->
                <div class="space-y-1">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" id="email" name="email" 
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150 sm:text-sm" 
                            placeholder="name@example.com">
                    </div>
                    <!-- Success Message Placeholder -->
                    <p id="successMessage" class="hidden text-xs text-green-600 mt-2 flex items-center bg-green-50 p-2 rounded border border-green-100">
                        <i class="fa-solid fa-circle-check mr-2"></i> 
                        <span>Mã xác thực sẽ được gửi về email của bạn.</span>
                    </p>
                    <!-- Error Message Placeholder -->
                    <p id="emailError" class="hidden text-xs text-red-500 mt-1 flex items-center">
                        <i class="fa-solid fa-circle-exclamation mr-1"></i> Email không tồn tại trong hệ thống.
                    </p>
                </div>
                <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 transform hover:-translate-y-0.5">
                    --> Gửi mã xác thực
                </button>

                <!-- Back to Login -->
                <div class="text-center">
                    <a th:href="@{/auth/login}" class="text-sm font-medium text-gray-600 hover:text-blue-600 flex items-center justify-center gap-2 transition-colors">
                        <i class="fa-solid fa-arrow-left text-xs"></i>
                        Quay lại đăng nhập
                    </a>
                </div>

            </form>
        </div>
    </div>

<div th:replace="~{fragments/navbar :: dropdown-script}"></div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
