<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực thất bại - BookNow Kiosk</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb', // blue-600
                        }
                    },
                    animation: {
                        'shake': 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Ẩn thanh cuộn */
        body {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen flex flex-col justify-center items-center relative overflow-hidden">

<!-- === BACKGROUND DECORATION === -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-red-200 rounded-full opacity-30 blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 bg-red-300 rounded-full opacity-20 blur-3xl"></div>
</div>

<!-- === LOGO (Fixed Top-Left, 25px margin) === -->
<div style="position: fixed; top: 25px; left: 25px; z-index: 100;" class="bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-white/50">
    <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center border border-blue-100">
            <i class="fa-solid fa-house-chimney gradient-icon text-2xl text-blue-600"></i>
        </div>
        <div class="flex flex-col justify-center">
            <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-blue-700 leading-none">BookNow</span>
        </div>
    </div>
</div>

<!-- === MAIN KIOSK CARD === -->
<div class="w-full max-w-xl px-4 relative z-10 text-center">

    <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-14 border border-white/60 relative overflow-hidden animate-shake">

        <!-- Failure Icon -->
        <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-8 text-red-600 shadow-sm border border-red-200">
            <i class="fa-solid fa-triangle-exclamation text-5xl"></i>
        </div>

        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3">Xác thực không thành công</h1>
        <p class="text-gray-500 text-lg mb-8">
            Hệ thống không thể nhận diện thông tin từ video của bạn.
        </p>

        <!-- Reasons Box -->
        <div class="bg-red-50 rounded-3xl p-6 border border-red-100 mb-10 text-left">
            <h3 class="font-bold text-red-800 mb-3 text-sm uppercase tracking-wide">
                <i class="fa-solid fa-circle-info mr-1"></i> Nguyên nhân phổ biến:
            </h3>
            <ul class="space-y-3">
                <li class="flex items-start gap-3 text-gray-700">
                    <i class="fa-solid fa-video-slash text-red-500 mt-1"></i>
                    <span>Video bị mờ, rung lắc hoặc thiếu sáng.</span>
                </li>
                <li class="flex items-start gap-3 text-gray-700">
                    <i class="fa-solid fa-id-card text-red-500 mt-1"></i>
                    <span>Không nhìn rõ thông tin trên CCCD/CMND.</span>
                </li>
                <li class="flex items-start gap-3 text-gray-700">
                    <i class="fa-solid fa-user-xmark text-red-500 mt-1"></i>
                    <span>Khuôn mặt trong video không khớp với giấy tờ.</span>
                </li>
            </ul>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-4">
            <button onclick="retryVerification()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/30 transition-all transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-3">
                <i class="fa-solid fa-rotate-right"></i>
                <span>Quay lại video định danh</span>
            </button>

            <button onclick="cancelCheckIn()" class="w-full bg-white border-2 border-gray-200 text-gray-600 text-lg font-bold py-4 rounded-2xl hover:bg-gray-50 hover:text-red-600 hover:border-red-200 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-xmark"></i>
                <span>Hủy Check-in</span>
            </button>
        </div>

        <p class="mt-6 text-sm text-gray-400">
            Cần hỗ trợ? Gọi hotline <span class="text-blue-600 font-bold">1900 8888</span>
        </p>

    </div>

</div>

<!-- === SCRIPT LOGIC === -->
<script>
    function retryVerification() {
        const btn = document.querySelector('button[onclick="retryVerification()"]');
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang tải...';
        btn.classList.add('opacity-80', 'cursor-wait');

        setTimeout(() => {
            // Redirect back to instructions or camera
            window.location.href = '/book-now/checkin/booking-code';
        }, 1000);
    }

    function cancelCheckIn() {
        if(confirm("Bạn có chắc chắn muốn hủy quá trình check-in không?")) {
            window.location.href = '/book-now/checkin/booking-code'
        }
    }
</script>
</body>
</html>
