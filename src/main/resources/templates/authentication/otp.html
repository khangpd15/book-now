<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - BookNow</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#60a5fa', // blue-400
                            DEFAULT: '#3b82f6', // blue-500
                            dark: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">



    <style>
        /* Specific Logo Positioning Rule */
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 50;
        }

        /* Subtle background pattern */
        body {
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* OTP Input Styling */
        .otp-input {
            letter-spacing: 0.5em;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .otp-input::placeholder {
            letter-spacing: 0.5em;
            font-weight: 400;
            color: #d1d5db;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans text-gray-800 relative p-4">

<!-- LOGO (Fixed Position) -->
<div class="logo-fixed flex items-center gap-3 select-none cursor-pointer">
    <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center border border-blue-100">
        <i class="fa-solid fa-house-chimney gradient-icon text-xl text-blue-600"></i>
    </div>
    <div class="flex flex-col justify-center">
        <span class="text-2xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-blue-600 leading-none">BookNow</span>
        <span class="text-[10px] text-gray-500 font-medium uppercase tracking-wider pl-0.5">Homestay System</span>
    </div>
</div>

<!-- MAIN CARD -->
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">

    <!-- Header -->
    <div class="px-8 pt-10 pb-4 text-center">
        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-envelope-circle-check text-2xl text-blue-600"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Xác thực Email</h2>
        <p class="text-sm text-gray-500 mt-2 leading-relaxed">
            Mã OTP 6 số đã được gửi đến<br>
            <span class="font-semibold text-gray-800" id="displayEmail">name@example.com</span>
        </p>
    </div>

    <!-- Form -->
    <div class="px-8 pb-8">
        <form th:action="@{/auth/verifiedOtp}" method="post" id="otpForm" class="space-y-6">
<!--            <input type="hidden"-->
<!--                   th:name="${_csrf.parameterName}"-->
<!--                   th:value="${_csrf.token}"/>-->

            <!-- OTP Input Field -->
            <div class="space-y-1">
                <label for="otp" class="block text-sm font-medium text-gray-700 text-center uppercase tracking-wider">Mã OTP</label>
                <div class="relative">
                    <input type="text" id="otp" name="otp"
                           class="otp-input block w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150">
                    <input type="hidden" name="email" th:value="${email}">
                </div>

                <!-- Error Message Placeholders -->
                <p id="otpError" class="hidden text-xs text-red-500 mt-2 flex items-center justify-center bg-red-50 p-2 rounded border border-red-100">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i>
                    <span id="otpErrorText">Mã OTP không chính xác.</span>
                </p>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 transform hover:-translate-y-0.5">
                <span id="btnText">Xác nhận OTP</span>
                <i id="btnLoader" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
            </button>

            <!-- Resend Code -->


            <!-- Back Link -->
            <div class="pt-2 border-t border-gray-100 mt-4">
                <a th:href="@{/auth/registerEmail}" class="text-xs text-gray-500 hover:text-gray-700 flex items-center justify-center gap-1 mt-4 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i> Nhập lại Email
                </a>
            </div>

        </form>
        <div class="text-center">
            <p class="text-sm text-gray-600 mb-1">Bạn không nhận được mã?</p>

            <form th:action="@{/auth/otp}" method="get" id="resendForm">
                <input type="hidden" name="email" th:value="${email}">
                <button type="submit"
                        id="resendBtn"
                        class="text-sm font-medium text-blue-600 hover:text-blue-500 transition-colors disabled:text-gray-400 disabled:cursor-not-allowed disabled:no-underline">
                    Gửi lại mã (<span id="countdown">60</span>s)
                </button>
            </form>
        </div>
    </div>

    <div th:if="${otp}"
         class="fixed inset-0 flex items-center justify-center bg-black/40 z-50">

        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center animate-fade-in">
            <div class="mb-3">
                <i class="fa-solid fa-circle-exclamation text-red-500 text-3xl"></i>
            </div>

            <!-- Nội dung message -->


            <p class="text-sm text-gray-700 font-medium" th:text="${#strings.defaultString(otp,'cannot spam otp')}"></p>

            <button onclick="this.closest('.fixed').remove()"
                    class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">
                OK
            </button>
        </div>
    </div>
</div>
