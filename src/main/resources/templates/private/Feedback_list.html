<!DOCTYPE html>
<html lang="vi" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phản hồi khách hàng - BookNow</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              light: '#60a5fa', // blue-400
              DEFAULT: '#3b82f6', // blue-500
              dark: '#2563eb', // blue-600
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Specific Logo Positioning Rule */
    .logo-fixed {
      position: fixed;
      top: 0;
      left: 0;
      margin-top: 25px;
      margin-left: 25px;
      z-index: 60; /* Higher than sidebar */
    }

    .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gradient-icon {
      color: #3b82f6;
    }

    /* Sidebar transitions */
    .sidebar {
      transition: transform 0.3s ease-in-out;
    }

    /* Hide scrollbar for sidebar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Toggle Switch */
    .toggle-checkbox:checked {
      right: 0;
      border-color: #3b82f6;
    }
    .toggle-checkbox:checked + .toggle-label {
      background-color: #3b82f6;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<div sec:authorize="hasRole('ADMIN')">
    <div th:replace="fragments/sidebar :: admin-sidebar('feedback','admin')"></div>
    <script th:replace="fragments/sidebar :: sidebar-scripts('admin')"></script>
</div>
<div sec:authorize="hasRole('STAFF')">
    <div th:replace="fragments/sidebar :: staff-sidebar('feedback','staff')"></div>
    <script th:replace="fragments/sidebar :: sidebar-scripts('staff')"></script>
</div>


<!-- OVERLAY (for mobile) -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden glass-effect"></div>

<!-- MAIN CONTENT -->
<main class="lg:ml-64 min-h-screen pt-24 lg:pt-8 px-6 pb-10 transition-all duration-300">
    <div th:replace="~{fragments/infor_admin}"></div>
    <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Phản hồi & Đánh giá</h1>
      <p class="text-sm text-gray-500 mt-1">Quản lý ý kiến đóng góp từ khách hàng</p>
    </div>
    <!-- Overall Rating Widget -->
    <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-lg border border-gray-100 shadow-sm">
    </div>
  </div>

  <!-- FILTERS CARD -->
  <form method="get" th:action="@{/staff/feedback}" id="filterForm">

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

        <!-- Star Rating Filter -->
        <div class="space-y-1">
          <label class="text-xs font-medium text-gray-500 uppercase">Mức đánh giá</label>
          <div class="relative">
            <select name="rating"
                    onchange="document.getElementById('filterForm').submit()"
                    class="w-full pl-9 pr-8 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none bg-white cursor-pointer">

              <option value="" th:selected="${rating == null}">Tất cả mức sao</option>
              <option value="5" th:selected="${rating == 5}">5 Sao (Tuyệt vời)</option>
              <option value="4" th:selected="${rating == 4}">4 Sao (Tốt)</option>
              <option value="3" th:selected="${rating == 3}">3 Sao (Bình thường)</option>
              <option value="2" th:selected="${rating == 2}">2 Sao (Kém)</option>
              <option value="1" th:selected="${rating == 1}">1 Sao (Tệ)</option>

            </select>

            <i class="fa-solid fa-star absolute left-3 top-2.5 text-gray-400"></i>
            <i class="fa-solid fa-chevron-down absolute right-3 top-3 text-xs text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <!-- Visibility Filter -->
        <div class="space-y-1">
          <label class="text-xs font-medium text-gray-500 uppercase">Trạng thái hiển thị</label>
          <div class="relative">
            <select name="hidden"
                    onchange="document.getElementById('filterForm').submit()"
                    class="w-full pl-9 pr-8 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none bg-white cursor-pointer">

              <option value="" th:selected="${hidden == null}">Tất cả trạng thái</option>
              <option value="false" th:selected="${hidden == false}">Đang hiện</option>
              <option value="true" th:selected="${hidden == true}">Đang ẩn</option>

            </select>

            <i class="fa-regular fa-eye absolute left-3 top-2.5 text-gray-400"></i>
            <i class="fa-solid fa-chevron-down absolute right-3 top-3 text-xs text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <!-- Room / Customer Search -->
        <div class="space-y-1 lg:col-span-2">
          <label class="text-xs font-medium text-gray-500 uppercase">Tìm kiếm</label>
          <div class="flex gap-2">

            <div class="relative flex-1">
              <input type="text"
                     name="keyword"
                     th:value="${keyword}"
                     placeholder="tên khách hàng"
                     class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">

              <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
            </div>

            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors text-sm font-medium shadow-sm">
              Tìm kiếm
            </button>

          </div>
        </div>

      </div>
    </div>

  </form>

  <!-- TABLE SECTION -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Mã phản hồi</th>
          <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Khách hàng</th>
          <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Số phòng</th>
          <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Đánh giá</th>
          <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Trạng thái</th>
          <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Hành động</th>
        </tr>
        </thead>



        <tbody class="divide-y divide-gray-50">
        <tr th:each="fb : ${feedbackList}"
            class="hover:bg-gray-50 transition-colors"
            th:classappend="${fb.isHidden} ? 'bg-red-50/30' : ''">

          <td class="py-4 px-6 font-medium text-gray-900" th:text="${'#FB-' + #numbers.formatInteger(fb.feedbackId, 5)}">#FB-00128</td>

          <td class="py-4 px-6">
            <div class="flex items-center gap-3">

              <div>
                <p class="text-sm font-medium text-gray-900" th:text="${fb.customerName}">Anh Tuấn</p>
                <p class="text-xs text-gray-500" th:text="${#temporals.format(fb.createdAt, 'dd/MM/yyyy')}">20/01/2026</p>
              </div>
            </div>
          </td>

          <td class="py-4 px-6">
            <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-medium" th:text="${fb.roomName}">P.305</span>
          </td>

          <td class="py-4 px-6">
            <div class="flex text-yellow-400 text-xs">
              <i th:each="i : ${#numbers.sequence(1, 5)}"
                 th:class="${i <= fb.rating} ? 'fa-solid fa-star' : 'fa-regular fa-star text-gray-300'"></i>
            </div>
            <p class="text-xs text-gray-500 mt-1 truncate w-32" th:text="${fb.rating >= 4 ? 'Khách hài lòng' : 'Cần chú ý'}">Phòng sạch</p>
          </td>

            <td class="px-6 py-4">
                <!-- Hiện -->
                <span th:if="${fb.isHidden == false}"
                      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700 border border-green-200">
        <i class="fa-regular fa-eye mr-1"></i>
        Hiện
            </span>
            <!-- Ẩn -->
            <span th:if="${fb.isHidden == true}"
                  class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">
        <i class="fa-regular fa-eye-slash mr-1"></i>
        Ẩn
            </span>
          </td>

          <td class="py-4 px-6 text-right">
            <a th:href="@{/staff/feedback/detail/{id}(id=${fb.feedbackId})}"
               class="inline-flex items-center gap-1
          bg-blue-600 hover:bg-blue-700
          text-white text-sm font-medium
          px-3 py-1.5 rounded-lg
          border border-blue-600
          shadow-sm transition-colors">
              <i class="fa-solid fa-eye text-xs"></i>
              Xem chi tiết
            </a>
          </td>
        </tr>
        </tbody>



      </table>
    </div>

    <!-- Pagination -->
    <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex items-center justify-between">

  <span class="text-sm text-gray-500">
    Tổng <span class="font-medium text-gray-900"
               th:text="${totalItems}"></span> phản hồi
  </span>

      <div class="flex items-center space-x-2">

        <!-- Previous -->
        <a th:if="${currentPage > 0}"
           th:href="@{/staff/feedback(page=${currentPage - 1}, rating=${rating}, hidden=${hidden}, keyword=${keyword})}"
           class="px-3 py-1 border rounded">
          <i class="fa-solid fa-chevron-left"></i>
        </a>

        <!-- Page number -->
        <span class="px-3 py-1 bg-blue-600 text-white rounded"
              th:text="${currentPage+1}"></span>

        <span class="text-sm text-gray-500">
        / <span th:text="${totalPages}"></span>
    </span>

        <!-- Next -->
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/staff/feedback(page=${currentPage+1}, rating=${rating}, hidden=${hidden}, keyword=${keyword})}"
           class="px-3 py-1 border rounded">
          <i class="fa-solid fa-chevron-right"></i>
        </a>

      </div>

    </div>
  </div>

</main>

<!-- SCRIPT -->
<script>
  // Mobile Sidebar Toggle
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  function toggleSidebar() {
    const isClosed = sidebar.classList.contains('-translate-x-full');
    if (isClosed) {
      sidebar.classList.remove('-translate-x-full');
      sidebarOverlay.classList.remove('hidden');
    } else {
      sidebar.classList.add('-translate-x-full');
      sidebarOverlay.classList.add('hidden');
    }
  }

  mobileMenuBtn.addEventListener('click', toggleSidebar);
  sidebarOverlay.addEventListener('click', toggleSidebar);
</script>
</body>
</html>
