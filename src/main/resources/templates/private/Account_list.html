<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản nhân viên - BookNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#60a5fa', // blue-400
                            DEFAULT: '#3b82f6', // blue-500
                            dark: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 60;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-icon {
            color: #3b82f6;
        }

        .sidebar {
            transition: transform 0.3s ease-in-out;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<div th:replace="fragments/sidebar :: admin-sidebar('accounts','admin')"></div>
<script th:replace="fragments/sidebar :: sidebar-scripts('admin')"></script>

<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden glass-effect"></div>

<main class="lg:ml-64 min-h-screen pt-24 lg:pt-8 px-6 pb-10 transition-all duration-300">
    <div th:replace="~{fragments/infor_admin}"></div>
    <!-- thông báo tạo tài khoản thành công -->
    <div th:if="${success}"
         class="alert-success mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded-r-lg shadow-sm flex items-center gap-3">

        <i class="fa-solid fa-circle-check"></i>

        <span th:text="${success}"></span>
    </div>

    <div class="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Danh sách tài khoản</h1>
            <p class="text-sm text-gray-500 mt-1">Quản lý tài khoản truy cập hệ thống (Admin, Staff, Customer)</p>
        </div>
        <a th:href="@{/admin/create_staff_account}"
           class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg shadow-sm font-medium transition-colors">

            <i class="fa-solid fa-user-plus"></i>
            <span>Tạo tài khoản</span>

        </a>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
        <form th:action="@{/admin/account_list}" method="get">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-500 uppercase">Vai trò</label>
                    <div class="relative">
                        <select name="role" onchange="this.form.submit()" class="w-full pl-9 pr-8 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none bg-white cursor-pointer">
                            <option value="">Tất cả vai trò</option>
                            <option value="ADMIN" th:selected="${param.role != null and param.role[0] == 'ADMIN'}">Quản trị viên (Admin)</option>
                            <option value="STAFF" th:selected="${param.role != null and param.role[0] == 'STAFF'}">Nhân viên (Staff)</option>
                            <option value="CUSTOMER" th:selected="${param.role != null and param.role[0] == 'CUSTOMER'}">Khách hàng (Customer)</option>
                            <option value="HOUSEKEEPING" th:selected="${param.role != null and param.role[0] == 'HOUSEKEEPING'}">Housekeeping</option>
                        </select>
                        <i class="fa-solid fa-shield-halved absolute left-3 top-2.5 text-gray-400"></i>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-3 text-xs text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-500 uppercase">Trạng thái</label>
                    <div class="relative">
                        <select name="status" onchange="this.form.submit()" class="w-full pl-9 pr-8 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none bg-white cursor-pointer">
                            <option value="">Tất cả trạng thái</option>
                            <option value="ACTIVE" th:selected="${param.status != null and param.status[0] == 'ACTIVE'}">Đang hoạt động</option>
                            <option value="INACTIVE" th:selected="${param.status != null and param.status[0] == 'INACTIVE'}">Ngưng hoạt động</option>
                        </select>
                        <i class="fa-solid fa-toggle-on absolute left-3 top-2.5 text-gray-400"></i>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-3 text-xs text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-500 uppercase">Tìm kiếm</label>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text"
                                   name="search"
                                   th:value="${param.search}"
                                   placeholder="Theo tên"
                                   class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                        </div>
                        <button type="submit"
                                class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg transition-colors border border-gray-200">
                            Tìm</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b border-gray-100">
                <tr>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Họ tên</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Vai trò</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Trạng thái</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Hành động</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                <tr th:if="${users.isEmpty()}">
                    <td colspan="6" class="py-10 text-center text-gray-500" th:text="${message}">Không có dữ liệu</td>
                </tr>

                <tr th:each="user : ${users}" class="hover:bg-gray-50 transition-colors">
                    <td class="py-4 px-6 font-mono text-xs text-gray-500" th:text="${user.id}">001</td>
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-3">

                            <span class="font-medium text-gray-900" th:text="${user.fullName}">Name</span>
                        </div>
                    </td>
                    <td class="py-4 px-6 text-sm text-gray-600" th:text="${user.email}">email@example.com</td>
                    <td class="py-4 px-6">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ring-1 ring-inset"
                                      th:classappend="${user.role == 'ADMIN' ?
                                        'bg-purple-50 text-purple-700 ring-purple-600/20' :
                                        user.role == 'STAFF' ?
                                        'bg-blue-50 text-blue-700 ring-blue-600/20' :
                                        user.role == 'HOUSEKEEPING' ?
                                        'bg-green-50 text-green-700 ring-green-600/20' :
                                        'bg-orange-50 text-orange-700 ring-orange-600/20'}"
                                      th:text="${user.role}">Role</span>
                    </td>
                    <td class="py-4 px-6">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ring-1 ring-inset"
                                      th:classappend="${user.status == 'ACTIVE' ? 'bg-green-50 text-green-700 ring-green-600/20' : 'bg-gray-100 text-gray-600 ring-gray-500/20'}">
                                    <span class="w-1.5 h-1.5 rounded-full mr-1.5" th:classappend="${user.status == 'ACTIVE' ? 'bg-green-500' : 'bg-gray-400'}"></span>
                                    <span th:text="${user.status == 'ACTIVE' ? 'Hoạt động' : 'Ngưng hoạt động'}">Status</span>
                                </span>
                    </td>
                    <td class="py-4 px-6 text-right">


                        <a th:href="@{/admin/users/detail(
        userId=${user.id},
        userType=${user.role}
    )}"
                           class="inline-flex items-center gap-1
          bg-blue-600 hover:bg-blue-700
          text-white text-sm font-medium
          px-3 py-1.5 rounded-lg
          border border-blue-600
          shadow-sm transition-colors">
                            <i class="fa-solid fa-eye text-xs"></i>
                            Xem chi tiết
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex items-center justify-between">
            <span class="text-sm text-gray-500">Tổng cộng: <span class="font-medium text-gray-900" th:text="${users.size()}">0</span> tài khoản</span>
        </div>
    </div>
</main>

<script>
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        const isClosed = sidebar.classList.contains('-translate-x-full');
        if (isClosed) {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
    }
    mobileMenuBtn.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    setTimeout(function() {
        const alertBox = document.querySelector('.alert-success');
        if(alertBox){
            alertBox.style.display = 'none';
        }
    }, 2000);

</script>
</body>
</html>
