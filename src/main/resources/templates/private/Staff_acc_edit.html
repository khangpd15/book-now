<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa tài khoản - BookNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#60a5fa', // blue-400
                            DEFAULT: '#3b82f6', // blue-500
                            dark: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Specific Logo Positioning Rule */
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 60; /* Higher than sidebar */
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-icon {
            color: #3b82f6;
        }

        /* Sidebar transitions */
        .sidebar {
            transition: transform 0.3s ease-in-out;
        }

        /* Hide scrollbar for sidebar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<div th:replace="fragments/sidebar :: admin-sidebar('accounts','admin')"></div>
<script th:replace="fragments/sidebar :: sidebar-scripts('admin')"></script>

<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden glass-effect"></div>

<main class="lg:ml-64 min-h-screen pt-24 lg:pt-8 px-6 pb-10 transition-all duration-300">

    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
        <div>
            <nav class="flex text-sm text-gray-500 mb-1" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-2">
                    <li><a href="#" class="hover:text-blue-600">Dashboard</a></li>
                    <li><i class="fa-solid fa-chevron-right text-xs text-gray-400"></i></li>
                    <li><a href="#" class="hover:text-blue-600">Danh sách nhân viên</a></li>
                    <li><i class="fa-solid fa-chevron-right text-xs text-gray-400"></i></li>
                    <li class="font-medium text-gray-800">Chỉnh sửa</li>
                </ol>
            </nav>
            <h1 class="text-2xl font-bold text-gray-800">Chỉnh sửa tài khoản nhân viên</h1>
            <p class="text-sm text-gray-500 mt-1">Cập nhật thông tin cho tài khoản: <span class="font-semibold text-gray-800" th:text="${user.fullName}">Trần Thị B</span></p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden max-w-3xl mx-auto md:mx-0">
        <form id="editAccountForm"
              class="p-8"
              th:action="@{/admin/users/edit}"
              method="post"
              enctype="multipart/form-data">
            <input type="hidden" name="userId" th:value="${user.userId}">
            <!-- code chèn ảnh-->
            <div class="space-y-6 mb-6">
                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">
                    Ảnh đại diện
                </h3>

                <div class="flex flex-col items-center gap-4">

                    <!-- Avatar Preview -->
                    <div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden border-2 border-gray-300">
                        <img id="avatarPreview"
                             th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://via.placeholder.com/96'}"
                             class="w-full h-full object-cover">
                    </div>

                    <!-- Upload Input -->
                    <div class="space-y-2 w-full max-w-sm">
                        <label for="avatar" class="block text-sm font-medium text-gray-700">
                            Cập nhật ảnh đại diện
                        </label>

                        <input type="file"
                               id="avatar"
                               name="avatar"
                               accept="image/*"
                               onchange="previewAvatar(this)"
                               class="block w-full text-sm text-gray-500
       file:mr-4 file:py-2 file:px-4
       file:rounded-lg file:border-0
       file:text-sm file:font-medium
       file:bg-blue-50 file:text-blue-700
       hover:file:bg-blue-100">

                        <p class="text-xs text-gray-400">
                            PNG, JPG tối đa 5MB
                        </p>
                    </div>

                </div>
            </div>

            <div class="space-y-6">
                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">Thông tin tài khoản</h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label for="fullName" class="block text-sm font-medium text-gray-700">Họ và tên <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-regular fa-user"></i>
                            </div>
                            <input type="text" id="fullName" name="fullName" th:value="${user.fullName}" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label for="phone" class="block text-sm font-medium text-gray-700">Số điện thoại <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-phone"></i>
                            </div>
                            <input type="tel" id="phone" name="phone" th:value="${user.phone}" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email đăng nhập <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="email" id="email" name="email" th:value="${user.email}" readonly class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg shadow-sm bg-gray-50 text-gray-500 cursor-not-allowed sm:text-sm">
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Email đăng nhập không thể thay đổi.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label for="role" class="block text-sm font-medium text-gray-700">Vai trò <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-shield-halved"></i>
                            </div>
                        <!--          select          -->
                            <select id="role" name="role"
                                    class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-white appearance-none">

                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">
                                    Quản trị viên (Admin)
                                </option>

                                <option value="STAFF" th:selected="${user.role == 'STAFF'}">
                                    Nhân viên (Staff)
                                </option>

                                <option value="HOUSEKEEPING" th:selected="${user.role == 'HOUSEKEEPING'}">
                                    Nhân viên dọn phòng (Housekeeping)
                                </option>

                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label for="status" class="block text-sm font-medium text-gray-700">Trạng thái</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-toggle-on"></i>
                            </div>
                            <select id="status" name="status" class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-white appearance-none">
                                <option value="ACTIVE" th:selected="${user.status == 'ACTIVE'}">Hoạt động</option>
                                <option value="INACTIVE" th:selected="${user.status == 'INACTIVE'}">Ngưng hoạt động</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cập nhật mật khẩu -->
            <div class="space-y-6 mt-6">
                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">
                    Cập nhật mật khẩu
                </h3>

                <p class="text-sm text-gray-500">
                    Để trống nếu không muốn thay đổi mật khẩu
                </p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- New Password -->
                    <div class="space-y-1">
                        <label for="newPassword" class="block text-sm font-medium text-gray-700">
                            Mật khẩu mới
                        </label>

                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>

                            <input type="password"
                                   id="newPassword"
                                   name="newPassword"
                                   class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg">

                            <button type="button"
                                    onclick="togglePassword('newPassword','eyeNew')"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400">
                                <i id="eyeNew" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm New Password -->
                    <div class="space-y-1">
                        <label for="confirmNewPassword" class="block text-sm font-medium text-gray-700">
                            Xác nhận mật khẩu mới
                        </label>

                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>

                            <input type="password"
                                   id="confirmNewPassword"
                                   name="confirmNewPassword"
                                   class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg">

                            <button type="button"
                                    onclick="togglePassword('confirmNewPassword','eyeConfirm')"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400">
                                <i id="eyeConfirm" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
            <div class="mt-8 pt-6 border-t border-gray-100 flex items-center justify-end gap-3">
                <a th:href="@{/admin/users/detail(userId=${user.userId}, userType=${user.role})}" class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium transition-colors">
                    Hủy
                </a>
                <button type="submit" class="px-6 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Lưu thay đổi
                </button>
            </div>

        </form>
    </div>
</main>

<script>
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        const isClosed = sidebar.classList.contains('-translate-x-full');
        if (isClosed) {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
    }

    mobileMenuBtn.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // Giữ lại animation khi bấm Submit cho nó "xịn"
    document.getElementById('editAccountForm').addEventListener('submit', (e) => {

        const btn = e.target.querySelector('button[type="submit"]');

        const name = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;

        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmNewPassword').value;

        if(!name || !phone){
            e.preventDefault();
            alert('Vui lòng điền đầy đủ thông tin bắt buộc.');
            return;
        }

        if(newPass && newPass !== confirmPass){
            e.preventDefault();
            alert('Mật khẩu xác nhận không khớp');
            return;
        }

        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang lưu...';
        btn.classList.add('opacity-75','cursor-not-allowed');
    });


    // preview avatar
    function previewAvatar(input) {

        const preview = document.getElementById('avatarPreview');

        if (input.files && input.files[0]) {

            const file = input.files[0];

            // validate size (2MB)
            if (file.size > 2 * 1024 * 1024) {
                alert("Ảnh phải nhỏ hơn 2MB");
                input.value = "";
                return;
            }

            // validate type
            const allowed = ["image/jpeg", "image/png", "image/webp"];

            if (!allowed.includes(file.type)) {
                alert("Chỉ hỗ trợ JPG, PNG, WEBP");
                input.value = "";
                return;
            }

            const reader = new FileReader();

            reader.onload = function(e) {
                preview.src = e.target.result;
            };

            reader.readAsDataURL(file);
        }
    }

    function togglePassword(inputId, eyeId){

        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);

        if(input.type === "password"){
            input.type = "text";
            eye.classList.remove("fa-eye");
            eye.classList.add("fa-eye-slash");
        }else{
            input.type = "password";
            eye.classList.remove("fa-eye-slash");
            eye.classList.add("fa-eye");
        }
    }


</script>
</body>
</html>
