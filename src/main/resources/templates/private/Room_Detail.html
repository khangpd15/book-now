<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(title='Chi tiết phòng - BookNow')}"></head>
<style>
    .logo-fixed {
        position: fixed;
        top: 0; left: 0;
        margin-top: 25px; margin-left: 25px;
        z-index: 60;
    }
    .gradient-text {
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .gradient-icon { color: #3b82f6; }
    .sidebar { transition: transform 0.3s ease-in-out; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
<body class="bg-gray-50 font-sans text-gray-800">

<div sec:authorize="hasRole('ADMIN')">
    <div th:replace="fragments/sidebar :: admin-sidebar('rooms','admin')"></div>
    <script th:replace="fragments/sidebar :: sidebar-scripts('admin')"></script>
</div>
<div sec:authorize="hasRole('STAFF')">
    <div th:replace="fragments/sidebar :: staff-sidebar('rooms','staff')"></div>
    <script th:replace="fragments/sidebar :: sidebar-scripts('staff')"></script>
</div>


    <!-- MAIN CONTENT -->
    <main class="lg:ml-64 min-h-screen pt-24 lg:pt-8 px-6 pb-10 transition-all duration-300">
        
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div class="flex items-center gap-3">
                <a th:href="@{/staff/rooms/list}" class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-500 hover:text-blue-600 hover:border-blue-200 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Chi tiết phòng</h1>
                    <p class="text-sm text-gray-500 mt-1">Xem thông tin phòng <span th:text="${room.roomNumber}" class="font-bold text-gray-700"></span></p>
                </div>
            </div>
        </div>

        <div th:if="${successMessage}"
             class="bg-green-100 text-green-800 px-4 py-3 rounded mb-4">
            <span th:text="${successMessage}"></span>
        </div>

        <div th:if="${errorMessage}"
             class="bg-red-100 text-red-800 px-4 py-3 rounded mb-4">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- INFO CARD -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8">
                
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    <!-- LEFT COLUMN: Basic Info & Gallery (2/3 width) -->
                    <div class="xl:col-span-2 space-y-8">
                        
                        <!-- Section: General Info -->
                        <div class="space-y-6">
                            <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2 flex items-center gap-2">
                                <i class="fa-regular fa-id-card text-blue-500"></i> Thông tin cơ bản
                            </h3>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Room Number -->
                                <div class="space-y-1">
                                    <label class="block text-sm font-medium text-gray-500">Số phòng</label>
                                    <div th:text="${room.roomNumber}" class="block w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 font-semibold sm:text-sm">
                                    </div>
                                </div>

                                <!-- Status (Displayed as text block if not using badge in header) -->
                                <div class="space-y-1">
                                    <label class="block text-sm font-medium text-gray-500">Trạng thái hiện tại</label>
                                    <div class="block w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg sm:text-sm flex items-center gap-2">
                                        <div>
                                            <span th:text="${room.status.displayRoomName}" th:class="${room.status.getCssEnumClass()} + ' font-medium'" class="text-green-600 font-medium"><i class="fa-solid fa-circle text-[10px] mr-1"></i></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Room Type Display -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                <div class="space-y-1">
                                    <label class="block text-sm font-medium text-gray-500">Loại phòng</label>
                                    <div th:text="${room.roomType.name}" class="block w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 font-medium sm:text-sm">
                                    </div>
                                    <p class="text-xs text-gray-400 italic mt-1"
                                       th:text="|Diện tích: ${room.roomType.areaM2 ?: 0}m&sup2; - Tối đa: ${room.roomType.maxGuests ?: 0} người|">
                                    </p>
                                </div>
                                <div class="hidden md:block">
                                    <div class="w-full aspect-video bg-gray-100 rounded-lg border border-gray-200 overflow-hidden flex items-center justify-center relative">
                                        <!-- Hardcoded Room Type Image -->
                                        <img th:src="${room.roomType.imageUrl}"
                                             alt="Room Type Preview" class="w-full h-full object-cover">
                                    </div>
                                </div>
                            </div>

                            <!-- Pricing -->
                            <div class="grid grid-cols-2 gap-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <div class="space-y-1">
                                    <label class="block text-sm font-medium text-blue-900/70">Giá / Slot (Giờ)</label>
                                    <div th:text="${room != null
                                      ? #numbers.formatDecimal(room.roomType.basePrice,0,'POINT',0,'COMMA') + '₫'
                                      : 'N/A'}" class="text-blue-800 text-2xl font-bold">
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-sm font-medium text-blue-900/70">Giá / Đêm</label>
                                    <div th:text="${room != null
                                      ? #numbers.formatDecimal(room.roomType.overPrice,0,'POINT',0,'COMMA') + '₫'
                                      : 'N/A'}" class="text-blue-800 text-2xl font-bold">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Section: Images & Description -->
                        <div class="space-y-6">
                            <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2 flex items-center gap-2">
                                <i class="fa-regular fa-images text-purple-500"></i> Hình ảnh & Mô tả
                            </h3>

                            <!-- Image Gallery (View Only) -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-gray-500">Thư viện ảnh</label>
                                <div class="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                    <div th:if="${room.images == null or #lists.isEmpty(room.images)}"
                                         class="col-span-full aspect-square flex items-center justify-center border border-dashed border-gray-300 rounded-lg text-gray-400 italic">
                                        Không có hình ảnh
                                    </div>
                                    <!-- Image 1 -->
                                    <div th:each="img : ${room.images}"
                                         class="relative aspect-square rounded-lg overflow-hidden border border-gray-200 group cursor-pointer hover:shadow-md transition-shadow">

                                        <img th:src="${img.imageUrl}"
                                             class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-300">
                                    </div>
                                </div>
                            </div>

                            <!-- Description -->
                            <div class="space-y-1">
                                <label class="block text-sm font-medium text-gray-500">Mô tả chi tiết</label>
                                <div th:text="${room.roomType.description}"
                                        class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-700 sm:text-sm min-h-[100px] whitespace-pre-line"></div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: Amenities (1/3 width) -->
                    <div class="xl:col-span-1 space-y-8">
                        
                        <!-- Amenities Card -->
                        <div class="bg-gray-50 rounded-xl p-5 border border-gray-200 sticky top-24">
                            <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-list-check text-green-500"></i> Tiện nghi có sẵn
                            </h3>

                            <!-- Nếu không có tiện nghi -->
                            <div th:if="${room.roomAmenities == null or #lists.isEmpty(room.roomAmenities)}"
                                 class="text-sm text-gray-400 italic">
                                Không có tiện nghi
                            </div>

                            <!-- Amenities List (Read Only) -->
                            <label th:each="ra : ${room.roomAmenities}"
                                   class="flex items-center gap-2 p-2 bg-white rounded border border-gray-200">

                                <input type="checkbox"
                                       checked
                                       disabled
                                       class="h-4 w-4 text-blue-600 rounded border-gray-300">

                                <img th:if="${ra.amenity.iconUrl != null}"
                                     th:src="${ra.amenity.iconUrl}"
                                     class="w-5 h-5 object-cover rounded">

                                <span th:text="${ra.amenity.name}"
                                      class="text-sm text-gray-700">
    </span>

                            </label>
                        </div>

                    </div>
                </div>

                <!-- Footer Actions -->
                <div class="mt-8 pt-6 border-t border-gray-100 flex items-center justify-end gap-3 sticky bottom-0 bg-white py-4 z-10">
                    <form th:action="@{/staff/room/delete/{id}(id=${room.roomId})}"
                          method="post"
                          th:if="${room.status.name() == 'AVAILABLE'}">

                        <button type="submit"
                                onclick="return confirm('Bạn có chắc muốn chuyển ngừng sử dụng phòng này?')"
                                class="px-6 py-2.5 rounded-lg bg-red-600 hover:bg-red-700 text-white font-medium shadow-sm transition-colors flex items-center gap-2">

                            <i class="fa-solid fa-trash"></i>
                            Ngừng Sử Dụng
                        </button>

                    </form>

                    <!-- Nếu KHÔNG phải DELETED -->
                    <a th:if="${!isDeleted}"
                       th:href="@{/staff/rooms/edit/{id}(id=${room.roomId})}"
                       class="px-6 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm flex items-center gap-2">

                        <i class="fa-regular fa-pen-to-square"></i>
                        Chỉnh sửa thông tin
                    </a>

                    <!-- Nếu là DELETED -->
                    <form th:if="${isDeleted}"
                          th:action="@{/staff/room/restore/{id}(id=${room.roomId})}"
                          method="post">

                        <button type="submit"
                                onclick="return confirm('bạn có chất muốn Khôi phục phòng này?')"
                                class="px-6 py-2.5 rounded-lg bg-green-600 hover:bg-green-700 text-white font-medium shadow-sm flex items-center gap-2">

                            <i class="fa-solid fa-rotate-left"></i>
                            Khôi phục phòng
                        </button>
                    </form>
                </div>

            </div>
        </div>

    </main>
</body>
</html>
