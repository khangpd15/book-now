<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(title='Chi tiết phòng & Cập nhật trạng thái - BookNow')}"></head>
<style>
    /* Logo Positioning Rules - Strictly Followed */
    .logo-fixed {
        position: fixed;
        top: 50px;
        left: 50px;
        z-index: 60;
    }

    .gradient-text {
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .gradient-icon {
        color: #3b82f6;
    }

    /* Timeline Connector Line */
    .timeline-line::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 15px;
        width: 2px;
        background-color: #f3f4f6;
        z-index: 0;
    }
    
    /* Disable interaction for read-only fields visual cue */
    .read-only-field {
        background-color: #f9fafb;
        cursor: not-allowed;
    }
</style>
<body class="bg-gray-50 font-sans text-gray-800">


<div sec:authorize="hasRole('ADMIN')">
    <div th:replace="fragments/sidebar :: admin-sidebar('rooms','admin')"></div>
    <script th:replace="fragments/sidebar :: sidebar-scripts('admin')"></script>
</div>
<div sec:authorize="hasRole('STAFF')">
    <div th:replace="fragments/sidebar :: staff-sidebar('rooms','staff')"></div>
    <script th:replace="fragments/sidebar :: sidebar-scripts('staff')"></script>
</div>


    <!-- MAIN CONTENT AREA -->
    <main class="lg:ml-72 min-h-screen pt-32 lg:pt-12 px-6 pb-20 transition-all duration-300">
        
        <!-- Breadcrumbs & Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
                    <a href="#" class="hover:text-blue-600 transition-colors">Trang chủ</a>
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                    <a th:href="@{/admin/list}" class="hover:text-blue-600 transition-colors">Danh sách phòng</a>
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                    <span th:text="|Chi tiết phòng ${room.roomNumber}|" class="text-gray-800 font-medium"></span>
                </div>
                <h1 th:text="|Cập nhật trạng thái phòng ${room.roomNumber}|"class="text-2xl font-bold text-gray-800"></h1>
                <p class="text-sm text-gray-500 mt-1">Chỉ nhân viên mới có quyền cập nhật trạng thái tại đây.</p>
            </div>
            
            <a href="#" class="inline-flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Quay lại danh sách
            </a>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            
            <!-- LEFT COLUMN: Room Info (Read-Only) -->
            <div class="xl:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50 flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-circle-info text-blue-500"></i>
                            Thông tin phòng
                        </h3>
                        <span class="text-xs font-bold bg-gray-200 text-gray-600 px-2 py-1 rounded">Read-Only</span>
                    </div>
                    
                    <!-- Room Image Placeholder -->
                    <div class="h-48 bg-gray-200 w-full flex items-center justify-center text-gray-400 relative">
                        <!-- nếu có ảnh -->
                        <img th:if="${room.roomType.imageUrl != null}"
                             th:src="${room.roomType.imageUrl}"
                             class="w-full h-full object-cover">

                        <!-- nếu không có ảnh -->
                        <div th:if="${room.roomType.imageUrl == null}"
                             class="w-full h-full flex items-center justify-center text-gray-400">
                            <i class="fa-regular fa-image text-4xl"></i>
                        </div>

                        <div th:text="${room.roomType.name}"
                                class="absolute bottom-3 right-3 bg-black/60 text-white px-2 py-1 rounded text-xs">
                        </div>
                    </div>

                    <div class="p-6 space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Mã phòng</label>
                                <div th:text="${room.roomNumber}" class="read-only-field w-full px-3 py-2 rounded-lg border border-gray-200 text-sm font-bold text-gray-800">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Loại phòng</label>
                                <div th:text="${room.roomType.name}"
                                        class="read-only-field w-full px-3 py-2 rounded-lg border border-gray-200 text-sm text-gray-700">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Giá / Đêm</label>
                                <div th:text="${room != null
                                      ? #numbers.formatDecimal(room.roomType.overPrice,0,'POINT',0,'COMMA') + '₫'
                                      : 'N/A'}"
                                        class="read-only-field w-full px-3 py-2 rounded-lg border border-gray-200 text-sm font-medium text-blue-600">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Số người tối đa</label>
                                <div th:text="|${room.roomType.maxGuests} Người|"
                                        class="read-only-field w-full px-3 py-2 rounded-lg border border-gray-200 text-sm text-gray-700">
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Mô tả phòng</label>
                            <div th:text="${room.roomType.description}"
                                    class="read-only-field w-full px-3 py-2 rounded-lg border border-gray-200 text-sm text-gray-600 h-24 overflow-y-auto">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Status Management & History -->
            <div class="xl:col-span-2 space-y-6">
                
                <!-- CURRENT STATUS CARD -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 md:p-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 bg-gradient-to-r from-blue-50/50 to-white">
                        <div>
                            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">Trạng thái hiện tại</h2>
                            <div class="flex items-center gap-3" id="currentStatusDisplay">
                                <!-- Initial State: Available -->
                                <span th:classappend="${room.status.getCssEnumClass()}"
                                        class="inline-flex items-center px-4 py-2 rounded-full text-base font-bold bg-green-100 text-green-700 border border-green-200 shadow-sm transition-all duration-300 status-badge">
                                    <span class="w-2.5 h-2.5 rounded-full bg-green-500 mr-2 animate-pulse"></span>
                                    <span th:text="${room.status.getDisplayRoomName()}"></span>

                                </span>
                            </div>
                            <p  id="currentStatusDesc" class="text-sm text-gray-500 mt-3 max-w-lg transition-all duration-300">
                            </p>
                        </div>
                        <div class="hidden md:block">
                            <i class="fa-solid fa-door-open text-6xl text-gray-100"></i>
                        </div>
                    </div>
                </div>

                <!-- UPDATE STATUS FORM (INLINE) -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
                        <h3 class="font-semibold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-pen-to-square text-blue-500"></i>
                            Cập nhật trạng thái mới
                        </h3>
                    </div>
                    <div class="p-6">
                        <form id="updateStatusForm"
                              th:action="@{/staff/update}"
                              method="post"
                              class="space-y-6">
                            <input type="hidden" name="roomId" th:value="${room.roomId}">
                            <!-- Transition Logic UI -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Chọn trạng thái tiếp theo</label>
                                <div class="relative">
                                    <select id="newStatusSelect"
                                            name="status"
                                            class="block w-full pl-11 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-lg border bg-white shadow-sm cursor-pointer transition-colors disabled:bg-gray-100 disabled:text-gray-400">
                                        <option value="" disabled selected>-- Chọn trạng thái --</option>
                                        <!-- Options populated by JS based on rules -->
                                    </select>
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-list-check text-gray-400"></i>
                                    </div>
                                </div>
                                <p id="transitionHint" class="mt-2 text-xs text-blue-600 bg-blue-50 p-2 rounded border border-blue-100 inline-block">
                                    <i class="fa-solid fa-lightbulb mr-1"></i>
                                </p>
                            </div>

                            <!-- Actions -->
                            <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
                                <button type="button" id="resetBtn" class="px-5 py-2.5 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium transition-colors text-sm">
                                    Hủy thay đổi
                                </button>
                                <button type="submit" id="updateBtn" disabled class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium shadow-sm transition-colors text-sm flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                    <i class="fa-solid fa-floppy-disk"></i>
                                    <span>Cập nhật trạng thái</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- LOGIC SCRIPT -->
    <script th:inline="javascript">
        const STATUS_CONFIG = {
    'AVAILABLE': {
        label: 'Trống (Available)',
        desc: 'Phòng đang sẵn sàng để đón khách hoặc nhận đặt phòng mới.',
        colorClass: 'bg-green-100 text-green-700 border-green-200',
        dotColor: 'bg-green-500',
        icon: 'fa-check'
    },

    'DIRTY': {
        label: 'Bẩn (Dirty)',
        desc: 'Phòng cần dọn dẹp sau khi khách trả phòng.',
        colorClass: 'bg-orange-100 text-orange-700 border-orange-200',
        dotColor: 'bg-orange-500',
        icon: 'fa-trash'
    },

    'CLEANING': {
        label: 'Đang dọn dẹp (Cleaning)',
        desc: 'Phòng đang được dọn dẹp vệ sinh sau khi khách trả phòng.',
        colorClass: 'bg-yellow-100 text-yellow-700 border-yellow-200',
        dotColor: 'bg-yellow-500',
        icon: 'fa-broom'
    },

    'BOOKED': {
    label: 'Đã đặt phòng (Booked)',
    desc: 'Phòng đã được khách đặt trước và đang chờ check-in.',
    colorClass: 'bg-blue-100 text-blue-700 border-blue-200',
    dotColor: 'bg-blue-500',
    icon: 'fa-calendar-check'
    },

    'OCCUPIED': {
        label: 'Đang có khách (Occupied)',
        desc: 'Phòng đang có khách lưu trú. Không thể chỉnh sửa thông tin.',
        colorClass: 'bg-red-100 text-red-700 border-red-200',
        dotColor: 'bg-red-500',
        icon: 'fa-user-lock'
    },

    'DELETED': {
        label: 'Đã xóa (Deleted)',
        desc: 'Phòng đã bị xóa khỏi hệ thống.',
        colorClass: 'bg-gray-100 text-gray-700 border-gray-200',
        dotColor: 'bg-gray-500',
        icon: 'fa-trash-alt'
    },
            'MAINTENANCE': {
                label: 'Đang bảo trì (Maintenance)',
                desc: 'Phòng đang được sửa chữa hoặc bảo trì kỹ thuật. Không thể đặt hoặc sử dụng.',
                colorClass: 'bg-purple-100 text-purple-700 border-purple-200',
                dotColor: 'bg-purple-500',
                icon: 'fa-screwdriver-wrench'
            },

    'OUT_OF_SERVICE': {
        label: 'Bảo trì (Out of Service)',
        desc: 'Phòng đang gặp sự cố hoặc bảo dưỡng định kỳ. Tạm ngừng phục vụ.',
        colorClass: 'bg-gray-100 text-gray-700 border-gray-200',
        dotColor: 'bg-gray-500',
        icon: 'fa-screwdriver-wrench'
    }
};

        // Strict Transition Rules
        const TRANSITIONS = {

            'AVAILABLE': ['OUT_OF_SERVICE', 'MAINTENANCE'],

            'DIRTY': ['CLEANING'],

            'CLEANING': ['AVAILABLE'],

            'OUT_OF_SERVICE': ['MAINTENANCE', 'CLEANING'],

            'MAINTENANCE': ['DIRTY']

        };
/* ========= CURRENT STATUS FROM THYMELEAF ========= */

        // DOM Elements
        const currentStatusDisplay = document.getElementById('currentStatusDisplay');
        const currentStatusDesc = document.getElementById('currentStatusDesc');
        const newStatusSelect = document.getElementById('newStatusSelect');
        const transitionHint = document.getElementById('transitionHint');
        const updateBtn = document.getElementById('updateBtn');
        const updateStatusForm = document.getElementById('updateStatusForm');
        const resetBtn = document.getElementById('resetBtn');

        let currentStatusKey = /*[[${room.status}]]*/ "AVAILABLE";
        const LOCKED_STATUS = ["DELETED", "BOOKED", "OCCUPIED"];

        if (LOCKED_STATUS.includes(currentStatusKey)) {
            newStatusSelect.disabled = true;
            updateBtn.disabled = true;

            if (currentStatusKey === "DELETED") {
                transitionHint.innerHTML = "Phòng đã bị xóa nên không thể cập nhật trạng thái.";
            } else {
                transitionHint.innerHTML = "Phòng đang có khách hoặc đã được đặt. Không thể cập nhật thủ công.";
            }
        }

        // --- FUNCTIONS ---

        function renderCurrentStatus() {
            const config = STATUS_CONFIG[currentStatusKey];
            currentStatusDisplay.innerHTML = `
                <span class="inline-flex items-center px-4 py-2 rounded-full text-base font-bold border shadow-sm transition-all duration-300 ${config.colorClass}">
                    <span class="w-2.5 h-2.5 rounded-full mr-2 animate-pulse ${config.dotColor}"></span>
                    <i class="fa-solid ${config.icon} mr-2 text-sm opacity-75"></i>
                    ${config.label}
                </span>
            `;
            currentStatusDesc.textContent = config.desc;
        }

        function populateDropdown() {
            newStatusSelect.innerHTML = '<option value="" disabled selected>-- Chọn trạng thái --</option>';
            
            const allowedNext = TRANSITIONS[currentStatusKey] || [];

            if (allowedNext && allowedNext.length > 0) {
                allowedNext.forEach(statusKey => {
                    const option = document.createElement('option');
                    option.value = statusKey;
                    option.textContent = STATUS_CONFIG[statusKey].label;
                    newStatusSelect.appendChild(option);
                });
                if (!LOCKED_STATUS.includes(currentStatusKey)) {
                    newStatusSelect.disabled = false;
                }
                
                // Update Hint Text
                const readableTransitions = allowedNext.map(k => `"${STATUS_CONFIG[k].label.split(' (')[0]}"`).join(' hoặc ');
                transitionHint.innerHTML = `<i class="fa-solid fa-lightbulb mr-1"></i> Từ <strong>"${STATUS_CONFIG[currentStatusKey].label.split(' (')[0]}"</strong>, bạn chỉ có thể chuyển sang ${readableTransitions}.`;
                transitionHint.classList.remove('opacity-0');
            } else {
                // Should not happen in this logic, but safe fallback
                newStatusSelect.disabled = true;
                transitionHint.classList.add('opacity-0');
            }
        }

resetBtn.addEventListener('click', () => {
    newStatusSelect.value = "";
    updateBtn.disabled = true;

    renderCurrentStatus();
});

newStatusSelect.addEventListener('change', () => {
    updateBtn.disabled = false;
});

        // --- EVENT LISTENERS ---

       updateStatusForm.addEventListener('submit', function(e) {

    const nextStatus = newStatusSelect.value;

    if (!nextStatus) {
        e.preventDefault();
        alert("Vui lòng chọn trạng thái");
        return;
    }

    updateBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang cập nhật...';
    updateBtn.disabled = true;

});

        // --- INIT ---
        renderCurrentStatus();
        populateDropdown();

// Mobile Sidebar Toggle logic moved to fragment

    </script>

</body>
</html>
