<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản nhân viên - BookNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#60a5fa',
                            DEFAULT: '#3b82f6',
                            dark: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .logo-fixed { position: fixed; top: 0; left: 0; margin-top: 25px; margin-left: 25px; z-index: 60; }
        .gradient-text { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-icon { color: #3b82f6; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<div th:replace="fragments/sidebar :: admin-sidebar('accounts','admin')"></div>
<script th:replace="fragments/sidebar :: sidebar-scripts('admin')"></script>

<main class="lg:ml-64 min-h-screen pt-24 lg:pt-8 px-6 pb-10 transition-all duration-300">

    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-lg shadow-sm flex items-center gap-3">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${error}">Thông báo lỗi ở đây</span>
    </div>

    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
        <div>
            <nav class="flex text-sm text-gray-500 mb-1">
                <ol class="inline-flex items-center space-x-1 md:space-x-2">
                    <li><a th:href="@{/admin/dashboard}" class="hover:text-blue-600">Dashboard</a></li>
                    <li><i class="fa-solid fa-chevron-right text-xs text-gray-400"></i></li>
                    <li class="font-medium text-gray-800">Tạo mới nhân viên</li>
                </ol>
            </nav>
            <h1 class="text-2xl font-bold text-gray-800">Tạo tài khoản nhân viên mới</h1>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden max-w-3xl">
        <form th:action="@{/admin/create_staff_account}"
              th:object="${staffDTO}"
              method="POST"
              enctype="multipart/form-data"
              id="createAccountForm" class="p-8">

            <div class="space-y-6">

                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">Ảnh đại diện</h3>

                <div class="flex flex-col items-center gap-4">
                    <div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden border-2 border-gray-300">
                        <img id="avatarPreview" src="https://via.placeholder.com/96?text=Avatar" alt="Avatar Preview" class="w-full h-full object-cover">
                    </div>

                    <div class="space-y-2 w-full max-w-sm">
                        <label for="avatar" class="block text-sm font-medium text-gray-700 text-center">Chọn ảnh đại diện</label>
                        <input type="file"
                               id="avatar"
                               th:field="*{avatar}"
                               accept="image/*"
                               required
                               onchange="previewAvatar(this)"
                               class="block w-full text-sm text-gray-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-lg file:border-0
                    file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700
                    hover:file:bg-blue-100">
                        <p class="text-xs text-gray-400 text-center"></p>
                    </div>
                </div>

                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-2">Thông tin tài khoản</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="block text-sm font-medium text-gray-700">Họ và tên <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-regular fa-user"></i>
                            </div>
                            <input type="text" th:field="*{fullName}" placeholder="Ví dụ: Nguyễn Văn A" required
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-sm font-medium text-gray-700">Số điện thoại <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-phone"></i>
                            </div>
                            <input type="tel" th:field="*{phone}" placeholder="Ví dụ: 0912 345 678" required
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-medium text-gray-700">Email đăng nhập <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="email" th:field="*{email}" placeholder="staff@booknow.com" required
                               class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="block text-sm font-medium text-gray-700">Mật khẩu <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password"
                                   th:field="*{password}"
                                   id="password"
                                   placeholder="Nhập mật khẩu"
                                   required
                                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
                                   title="Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số"
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm">

                            <button type="button"
                                    onclick="togglePassword('password','eye1')"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400">

                                <i id="eye1" class="fa-solid fa-eye"></i>

                            </button>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">
                            Mật khẩu phải có ít nhất <b>8 ký tự</b>, gồm <b>1 chữ hoa</b>, <b>1 chữ thường</b> và <b>1 số</b>.
                        </p>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-sm font-medium text-gray-700">Xác nhận mật khẩu <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password"
                                   id="confirmPassword"
                                   th:field="*{confirmPassword}"
                                   placeholder="Nhập lại mật khẩu"
                                   required
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm">

                            <button type="button"
                                    onclick="togglePassword('confirmPassword','eye2')"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400">

                                <i id="eye2" class="fa-solid fa-eye"></i>

                            </button>
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-medium text-gray-700">Vai trò <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                        <select th:field="*{role}" class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-white appearance-none">
                            <option value="STAFF">Nhân viên (Staff)</option>
                            <option value="ADMIN">Quản trị viên (Admin)</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100 flex items-center justify-end gap-3">
                <a th:href="@{/admin/account_list}" class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium transition-colors">
                    Hủy bỏ
                </a>
                <button type="submit" class="px-6 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-user-check"></i>
                    Tạo tài khoản
                </button>
            </div>
        </form>
    </div>
</main>

<script>
    // Giữ nguyên JS toggle sidebar cho mobile
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        sidebar.classList.toggle('-translate-x-full');
        sidebarOverlay.classList.toggle('hidden');
    }

    if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
    if(sidebarOverlay) sidebarOverlay.addEventListener('click', toggleSidebar);

    // Client-side validation đơn giản (So khớp mật khẩu) trước khi gửi về Java
    document.getElementById('createAccountForm').addEventListener('submit', function(e) {

        const pass = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

        if(!passwordRegex.test(pass)){
            e.preventDefault();
            alert('Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.');
            return;
        }

        if(pass !== confirmPass) {
            e.preventDefault();
            alert('Mật khẩu xác nhận không khớp!');
        }

    });

    function togglePassword(inputId, eyeId){

        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);

        if(input.type === "password"){
            input.type = "text";
            eye.classList.remove("fa-eye");
            eye.classList.add("fa-eye-slash");
        }else{
            input.type = "password";
            eye.classList.remove("fa-eye-slash");
            eye.classList.add("fa-eye");
        }

    }

    function previewAvatar(input) {

        const preview = document.getElementById('avatarPreview');

        if (input.files && input.files[0]) {

            const file = input.files[0];

            // validate size (2MB)
            if (file.size > 2 * 1024 * 1024) {
                alert("Ảnh phải nhỏ hơn 2MB");
                input.value = "";
                return;
            }

            // validate type
            const allowed = ["image/jpeg", "image/png", "image/webp"];

            if (!allowed.includes(file.type)) {
                alert("Chỉ hỗ trợ JPG, PNG, WEBP");
                input.value = "";
                return;
            }

            const reader = new FileReader();

            reader.onload = function(e) {
                preview.src = e.target.result;
            };

            reader.readAsDataURL(file);
        }
    }



</script>
</body>
</html>
