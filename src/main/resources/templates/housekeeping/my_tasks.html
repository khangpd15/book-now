<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - BookNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<!-- Header -->
<header class="bg-blue-600 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">My Tasks - Housekeeping</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm">Welcome, Nguyen Van A</span>
            <a th:href="@{/auth/logout}" class="text-sm bg-blue-700 px-3 py-1 rounded hover:bg-blue-800">Logout</a>
        </div>
    </div>
</header>

<!-- Navigation (Simplified for housekeeping staff) -->
<nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex gap-6 py-3">
            <a href="my_tasks.html" class="text-blue-600 font-medium border-b-2 border-blue-600 pb-1">My Tasks</a>
            <a href="cleaning_tasks_list.html" class="text-gray-600 hover:text-blue-600">Cleaning Tasks</a>
<!--            <a href="overdue-checkout.html" class="text-gray-600 hover:text-blue-600">History</a>-->
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 py-6">
    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-600">Assigned to Me</p>
            <p class="text-3xl font-bold text-blue-600">3</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-600">In Progress</p>
            <p class="text-3xl font-bold text-yellow-600">2</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-600">Completed Today</p>
            <p class="text-3xl font-bold text-green-600">5</p>
        </div>
    </div>

    <!-- Page Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">My Assigned Tasks</h2>
            <p class="text-sm text-gray-500">Tasks assigned to you by management</p>
        </div>
        <div class="flex gap-2">
            <select class="border border-gray-300 rounded px-3 py-2 text-sm">
                <option value="">All Status</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="IN_PROGRESS">In Progress</option>
            </select>
        </div>
    </div>

    <!-- Task List -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50">
            <tr class="text-left text-sm text-gray-600">
                <th class="px-6 py-4 font-medium">Room Number</th>
                <th class="px-6 py-4 font-medium">Priority</th>
                <th class="px-6 py-4 font-medium">Assigned At</th>
                <th class="px-6 py-4 font-medium">Status</th>
                <th class="px-6 py-4 font-medium">Action</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <!-- Row 1 - IN_PROGRESS -->
            <tr th:each="housekeeping : ${housekeepingTask}" class="hover:bg-gray-50">
                <td class="px-6 py-4">
                    <span th:text="${housekeeping.room.getRoomNumber()}" class="font-bold text-gray-800"></span>
                </td>
                <td class="px-6 py-4">
                    <span th:text="${housekeeping.getPriority()}" class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs font-medium"></span>
                </td>
                <td class="px-6 py-4 text-gray-600">
                    <div th:text="${housekeeping.date()}"></div>
                    <div th:text="${housekeeping.createTime()}" class="text-xs text-gray-400"></div>
                </td>
                <td class="px-6 py-4">
                    <span th:text="${housekeeping.getStatus()}" class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-medium"></span>
                </td>
                <td class="px-6 py-4">
                    <a th:href="@{/housekeeping/task-detail(taskId=${housekeeping.getTaskId()})}" class="text-blue-600 hover:underline text-sm mr-3">View</a>
                </td>
            </tr>

            </tbody>
        </table>
    </div>

    <!-- Completed Today Section -->
    <div class="mt-8">

        <div class="flex items-center mb-4">
            <h3 class="text-lg font-semibold text-gray-800">Completed Today</h3>
            <span class="ml-2 px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-medium">5 tasks</span>
        </div>

        <!-- GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">

            <div th:each="housekeeping : ${housekeepingTask}"
                 th:if="${housekeeping.status == 'COMPLETED'}"
                 class="bg-white rounded-lg shadow p-4 border-l-4 border-green-600">

                <div class="flex items-start justify-between mb-2">
                <span th:text="${housekeeping.room.roomNumber}"
                      class="font-bold text-lg text-gray-800"></span>
                    <span class="text-green-600 font-bold">✓</span>
                </div>

                <p th:text="${housekeeping.room.roomType.name}"
                   class="text-xs text-gray-600 mb-2"></p>

                <p th:text="'Completed at ' + ${housekeeping.completedTime()}"
                   class="text-xs text-gray-500"></p>

            </div>

        </div>

    </div>
</main>
</body>
</html>
