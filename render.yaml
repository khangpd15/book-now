services:
  - type: web
    name: book-now
    runtime: java
    plan: standard
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/book-now-1.0-SNAPSHOT.jar
    healthCheckPath: /book-now/
    
    # Environment Variables
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: book-now-db
          property: connectionString
      - key: DATABASE_USER
        prompt: false
        value: ""  # Set in Render dashboard
      - key: DATABASE_PASSWORD
        prompt: false
        sensitive: true
        value: ""  # Set in Render dashboard
      - key: GOOGLE_CLIENT_ID
        prompt: false
        value: ""  # Set in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        prompt: false
        sensitive: true
        value: ""  # Set in Render dashboard
      - key: MOMO_PARTNER_CODE
        prompt: false
        value: "MOMOLRJZ20181206"
      - key: MOMO_ACCESS_KEY
        prompt: false
        value: "mTCKt9W3eU1m39TW"
      - key: MOMO_SECRET_KEY
        prompt: false
        sensitive: true
        value: ""  # Set in Render dashboard
      - key: APP_URL
        prompt: false
        value: ""  # Will be set to your Render URL
      - key: MAIL_USERNAME
        prompt: false
        value: "vod019608@gmail.com"
      - key: MAIL_PASSWORD
        prompt: false
        sensitive: true
        value: ""  # Set in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        prompt: false
        value: "dzlfgmtbc"
      - key: CLOUDINARY_API_KEY
        prompt: false
        value: "144287537763843"
      - key: CLOUDINARY_API_SECRET
        prompt: false
        sensitive: true
        value: ""  # Set in Render dashboard

    # Disk for persistent storage (if needed)
    disk:
      name: book-now-data
      mountPath: /var/data
      sizeGB: 1
